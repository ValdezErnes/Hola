<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Bienvenido</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0F4C81, #3B82F6, #93C5FD);
            overflow: hidden;
        }

        .card {
            width: 360px;
            padding: 45px;
            text-align: center;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            animation: entrada 1s ease;
        }

        @keyframes entrada {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.3rem;
        }

        p {
            margin-bottom: 30px;
            font-size: 1.2rem;
            opacity: 0.95;
        }

        button {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            background: white;
            color: #1565C0;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-3px) scale(1.05);
            background: #E3F2FD;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>

<body>
    <div class="card">
        <h1 id="titulo">Hola</h1>
        <p id="texto">Bienvenido</p>

        <button id="btn" type="button">
            Comenzar
        </button>
    </div>

    <script>
        let paso = 0;

        const titulo = document.getElementById('titulo');
        const texto = document.getElementById('texto');
        const boton = document.getElementById('btn');

        boton.addEventListener('click', () => {
            if (paso > 1) window.location.reload();
            if (paso === 0) {
                titulo.textContent = 'Ya es todo Bro';
                texto.textContent = '';
                boton.textContent = 'Continuar';
                paso++;
                return;
            }
            paso++;
            titulo.textContent = 'Ya vete we';
            texto.textContent = '';
            boton.textContent = 'Fin';
            boton.disabled = true;
            boton.style.opacity = '0.7';
            boton.style.cursor = 'default';
        });
    </script>
</body>
</html>
